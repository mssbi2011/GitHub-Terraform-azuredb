name: Deploy Azure SQL Database

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'Azure/SQLDB-SERVODS'
  BACKEND_RESOURCE_GROUP: 'rg-terraform-state'
  BACKEND_STORAGE_ACCOUNT: 'sttfstateservods'
  BACKEND_CONTAINER: 'tfstate'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (no backend)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: validate
    environment: uat
    env:
      ARM_CLIENT_ID: ${{ secrets.UAT_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.UAT_ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.UAT_ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.UAT_ARM_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - UAT
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=sqldb-uat.tfstate"

      - name: Terraform Plan - UAT
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="uat.tfvars" \
            -var="admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -out=uat.tfplan

      - name: Terraform Apply - UAT
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve uat.tfplan

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: deploy-uat
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.PROD_ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.PROD_ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.PROD_ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.PROD_ARM_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Prod
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=sqldb-prod.tfstate"

      - name: Terraform Plan - Prod
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="prod.tfvars" \
            -var="admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -out=prod.tfplan

      - name: Terraform Apply - Prod
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve prod.tfplan
